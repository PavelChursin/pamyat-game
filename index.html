<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>ПАМЯТЬ - Логический Тренажер СССР</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --phosphor: #00ff41;
            --phosphor-dim: #004411;
            --crt-bg: #0a0c0a;
        }

        body {
            background-color: #121212;
            color: var(--phosphor);
            font-family: 'Courier Prime', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Корпус автомата */
        .cabinet {
            background: #3a3d3c;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border: 3px solid #222;
            width: 98vw;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .cabinet { padding: 20px; }
        }

        /* ЭЛТ Экран */
        .screen-border {
            background: #111;
            padding: 8px;
            border-radius: 12px;
            border: 6px solid #222;
            box-shadow: inset 0 0 20px #000;
        }

        .screen {
            background: var(--crt-bg);
            aspect-ratio: 4/5;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
        }

        @media (min-width: 640px) {
            .screen { aspect-ratio: 4/3; }
        }

        /* Эффект сканирования */
        .screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .content {
            padding: 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: flicker 0.3s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .vector-line {
            stroke: var(--phosphor);
            stroke-width: 3.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 2px var(--phosphor));
            opacity: 0.08;
            transition: opacity 0.2s;
        }

        .vector-line.active {
            opacity: 1;
        }

        .option-card {
            border: 1px solid var(--phosphor-dim);
            aspect-ratio: 1;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card:active {
            background: rgba(0,255,65,0.2);
            border-color: var(--phosphor);
        }

        .option-card.hint {
            border: 2px solid #fff;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .btn-retro {
            background: #2a2a2a;
            border-bottom: 3px solid #000;
            color: #aaa;
            padding: 12px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            width: 100%;
        }

        .btn-retro:active {
            border-bottom-width: 0;
            transform: translateY(3px);
        }

        /* Кастомное модальное окно */
        #custom-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--crt-bg);
            border: 2px solid var(--phosphor);
            padding: 15px;
            width: 80%;
            z-index: 100;
            text-align: center;
            display: none;
            box-shadow: 0 0 20px #000;
        }

        .led {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #200;
        }
        .led.on {
            background: #f00;
            box-shadow: 0 0 5px #f00;
        }
    </style>
</head>
<body>

    <div class="cabinet">
        <div class="flex justify-between items-center mb-2 text-[8px] text-gray-500 tracking-tighter">
            <div>АППАРАТ ЭЛЕКТРОННЫЙ «ПАМЯТЬ»</div>
            <div class="flex items-center gap-1">
                <span>СЕТЬ</span>
                <div class="led on"></div>
            </div>
        </div>

        <div class="screen-border">
            <div class="screen">
                <div class="content" id="display">
                    
                    <!-- Экран заставки -->
                    <div id="start-screen" class="flex flex-col items-center justify-center h-full text-center p-4">
                        <h1 class="text-3xl sm:text-4xl font-bold mb-2 tracking-tighter">ПАМЯТЬ</h1>
                        <div class="h-0.5 w-32 bg-green-500 mb-4"></div>
                        <p class="text-[10px] sm:text-xs mb-6 leading-tight uppercase">Дополните фигуру до целой,<br>выбрав верный сегмент</p>
                        <button onclick="startGame()" class="btn-retro text-green-500 border-green-900 max-w-[150px]">ПУСК</button>
                    </div>

                    <!-- Игровой экран -->
                    <div id="game-screen" class="hidden flex flex-col h-full">
                        <div class="flex justify-between text-[10px] mb-2 border-b border-green-900 pb-1">
                            <span>ЭТАП: <span id="lvl">1</span></span>
                            <span>ОЧКИ: <span id="pts">0</span></span>
                        </div>
                        
                        <div class="flex-grow flex flex-col sm:flex-row items-center justify-center gap-4">
                            <!-- Основная фигура -->
                            <div class="w-32 h-32 sm:w-40 sm:h-40 flex flex-col items-center">
                                <span class="text-[8px] mb-1 opacity-50 uppercase">Образец</span>
                                <div id="main-svg-container" class="w-full h-full"></div>
                            </div>

                            <!-- Сетка вариантов -->
                            <div class="grid grid-cols-2 gap-2 w-full max-w-[180px]" id="options-grid">
                                <!-- Варианты -->
                            </div>
                        </div>
                        
                        <div id="hint-bar" class="text-[8px] text-center mt-2 h-3 opacity-60 uppercase"></div>
                    </div>

                    <!-- Внутриэкранное уведомление -->
                    <div id="custom-modal">
                        <div id="modal-title" class="text-lg font-bold mb-2"></div>
                        <div id="modal-text" class="text-[10px] mb-4 uppercase"></div>
                        <button id="modal-btn" class="btn-retro text-xs py-2 px-4"></button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="mt-4 flex justify-between items-center gap-2">
            <button class="btn-retro text-[10px] flex-1 bg-red-900/20" onclick="resetGame()">СБРОС</button>
            <button class="btn-retro text-[10px] flex-1" onclick="showInfo()">ИНФО</button>
        </div>
    </div>

    <script>
        const SEGMENTS = [
            [0,0, 50,0], [50,0, 100,0],
            [0,50, 50,50], [50,50, 100,50],
            [0,100, 50,100], [50,100, 100,100],
            [0,0, 0,50], [0,50, 0,100],
            [50,0, 50,50], [50,50, 50,100],
            [100,0, 100,50], [100,50, 100,100],
            [0,0, 50,50], [50,50, 100,100],
            [100,0, 50,50], [50,50, 0,100]
        ];

        let level = 1;
        let score = 0;
        let correctIdx = -1;
        let audioCtx = null;

        function createSVG(segments, activeIndices) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.style.width = "100%";
            svg.style.height = "100%";

            segments.forEach((coords, i) => {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", coords[0]);
                line.setAttribute("y1", coords[1]);
                line.setAttribute("x2", coords[2]);
                line.setAttribute("y2", coords[3]);
                line.classList.add("vector-line");
                if (activeIndices.includes(i)) line.classList.add("active");
                svg.appendChild(line);
            });
            return svg;
        }

        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            level = 1; score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            nextLevel();
        }

        function nextLevel() {
            const mainContainer = document.getElementById('main-svg-container');
            const optionsGrid = document.getElementById('options-grid');
            const hintBar = document.getElementById('hint-bar');
            
            mainContainer.innerHTML = '';
            optionsGrid.innerHTML = '';
            closeModal();
            
            document.getElementById('lvl').innerText = level;
            document.getElementById('pts').innerText = score;

            const missingCount = Math.min(2 + Math.floor(level / 3), 6);
            const allIndices = Array.from({length: 16}, (_, i) => i);
            const shuffled = [...allIndices].sort(() => Math.random() - 0.5);
            
            const missingIndices = shuffled.slice(0, missingCount);
            const visibleIndices = shuffled.slice(missingCount);

            mainContainer.appendChild(createSVG(SEGMENTS, visibleIndices));

            correctIdx = Math.floor(Math.random() * 4);

            for (let i = 0; i < 4; i++) {
                const card = document.createElement('div');
                card.className = 'option-card';
                
                let optIndices = (i === correctIdx) ? missingIndices : 
                    [...allIndices].sort(() => Math.random() - 0.5).slice(0, missingCount);
                
                // Проверка на уникальность неправильного ответа
                if (i !== correctIdx && JSON.stringify([...optIndices].sort()) === JSON.stringify([...missingIndices].sort())) {
                    optIndices = [(optIndices[0] + 1) % 16];
                }

                card.appendChild(createSVG(SEGMENTS, optIndices));
                card.onclick = () => checkAnswer(i);
                
                if (level === 1 && i === correctIdx) {
                    card.classList.add('hint');
                    hintBar.innerText = "Подсказка: Выберите мерцающий блок";
                } else if (level > 1) {
                    hintBar.innerText = "";
                }

                optionsGrid.appendChild(card);
            }
        }

        function checkAnswer(idx) {
            if (idx === correctIdx) {
                score += 10;
                level++;
                playTone(600, 0.1);
                nextLevel();
            } else {
                playTone(150, 0.4);
                score = Math.max(0, score - 5);
                document.getElementById('pts').innerText = score;
                openModal("ОШИБКА", "Блок не подходит к структуре. попробуйте еще раз.", "ПОВТОР");
            }
        }

        function openModal(title, text, btnText) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const btn = document.getElementById('modal-btn');
            btn.innerText = btnText;
            btn.onclick = closeModal;
            document.getElementById('custom-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = 'none';
        }

        function resetGame() {
            location.reload();
        }

        function showInfo() {
            openModal("ИНФО", "Найдите недостающие сегменты квадрата 2х2. Нажмите на верный вариант.", "ОК");
        }

        function playTone(freq, dur) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }
    </script>
</body>
</html>
